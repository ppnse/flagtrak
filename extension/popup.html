<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlagTrak</title>
  <link rel="stylesheet" href="popup.css" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="scanlines"></div>

  <!-- ═══════════ LOGIN SCREEN ═══════════ -->
  <div id="screen-login" class="screen">
    <div class="login-wrap">
      <div class="login-logo">⚑</div>
      <h1 class="login-title">FlagTrak</h1>
      <p class="login-sub">CLUB CTF TRACKER</p>
      <div class="login-form">
        <input id="input-username" type="text"     placeholder="Username" autocomplete="off" spellcheck="false" />
        <input id="input-password" type="password" placeholder="Password" />
        <button id="btn-login">LOGIN</button>
        <div class="login-error" id="login-error"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════ MAIN SCREEN ═══════════ -->
  <div id="screen-main" class="screen hidden">

    <header class="header">
      <div class="header-left">
        <span class="logo-icon">⚑</span>
        <h1 class="title">FlagTrak</h1>
      </div>
      <div class="header-right">
        <div class="session-block">
          <span class="session-lbl">SESSION</span>
          <span class="sw-time" id="stopwatch">00:00:00</span>
        </div>
        <button class="logout-btn" id="btn-logout" title="Log out">⏏</button>
      </div>
    </header>

    <div class="status-bar">
      <span class="pulse-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">NO ACTIVE CTF</span>
      <span class="ctf-name" id="ctf-name"></span>
    </div>

    <section class="progress-section">
      <div class="user-row">
        <span class="user-name" id="display-username">—</span>
        <span class="progress-frac" id="progress-frac">0 / 0 solved</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-fill" style="width:0%"></div>
      </div>
      <div class="stats-row">
        <div class="stat"><span class="stat-n" id="stat-solved">0</span><span class="stat-l">SOLVED</span></div>
        <div class="stat"><span class="stat-n" id="stat-remain">0</span><span class="stat-l">LEFT</span></div>
        <div class="stat"><span class="stat-n" id="stat-pts">0</span><span class="stat-l">PTS</span></div>
      </div>
    </section>

    <section class="submit-section">
      <div class="sec-label">SUBMIT FLAG</div>
      <input id="ch-name" type="text" placeholder="Challenge name" autocomplete="off" spellcheck="false" />
      <div class="flag-row">
        <input id="ch-flag" type="text" placeholder="FLAG{...}" autocomplete="off" spellcheck="false" />
        <button id="btn-submit">SHARE</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </section>

    <section class="flags-section">
      <div class="sec-label-row">
        <span class="sec-label">CLUB FLAGS</span>
        <span class="flag-count" id="flag-count">0</span>
      </div>
      <div class="flags-list" id="flags-list">
        <div class="empty">No flags yet</div>
      </div>
    </section>

    <footer class="footer">
      <span class="footer-txt">FlagTrak v1.0</span>
      <button class="reset-btn" id="btn-reset">RESET</button>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
